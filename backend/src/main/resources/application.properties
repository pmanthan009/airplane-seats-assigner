# ----------------------------------------
# EMBEDDED SERVER CONFIGURATION
# ----------------------------------------
# Defines the port where the WebSocket and HTTP server will listen.
server.port=8080

spring.application.name=AirlineBookingWebSocketServer

# ----------------------------------------
# LOGGING AND DEBUGGING
# ----------------------------------------
# Shows clean, informative logs about your WebSocket routes on startup.
# Useful for verifying that /ws, /app, and /topic are mapped correctly.
logging.level.org.springframework.web=INFO
logging.level.org.springframework.messaging=INFO